<!DOCTYPE html>
<html>
<head>
    <title>Euro Budget Cloud</title>
    
    <!-- 1. THE LOGO & COLOR (This makes it look like a real app) -->
    <link rel="icon" href="https://fav.farm/💶">
    <link rel="apple-touch-icon" href="https://fav.farm/💶">
    <meta name="theme-color" content="#2196F3">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 700px; margin: auto; padding: 20px; background: #f0f2f5; color: #333; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .tab-menu { display: flex; margin-bottom: 20px; gap: 10px; }
        .tab-btn { flex: 1; padding: 12px; cursor: pointer; border: none; background: #dfe4ea; border-radius: 8px; font-weight: bold; }
        .tab-btn.active { background: #2196F3; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #eee; }
        input, select, button { margin: 8px 0; padding: 12px; width: 100%; box-sizing: border-box; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        .save-btn { background: #2196F3; color: white; border: none; font-weight: bold; cursor: pointer; height: 50px; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; background: white; }
        .delete-btn { background: #ff4757; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; }
        #balance-display { text-align: center; font-size: 2rem; margin: 15px 0; font-weight: bold; }
        .type-income { color: #2ed573; font-weight: bold; }
        .type-expense { color: #ff4757; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div class="tab-menu">
        <button class="tab-btn active" onclick="openTab('tracker')">Dashboard</button>
        <button class="tab-btn" onclick="openTab('history')">History</button>
    </div>

    <div id="tracker" class="tab-content active">
        <div class="form-group">
            <h2 style="margin:0 0 10px 0;">💶 Cloud Budget</h2>
            <input type="text" id="name" placeholder="Description">
            <input type="number" id="amount" placeholder="Amount (€)" inputmode="decimal">
            <select id="type">
                <option value="income">Income (+)</option>
                <option value="expense" selected>Expense (-)</option>
            </select>
            <button class="save-btn" onclick="handleSave()">Save to Cloud</button>
        </div>
        <div id="balance-display"><span id="balance">0.00</span>€</div>
        <canvas id="myChart" height="250"></canvas>
    </div>

    <div id="history" class="tab-content">
        <h2>📅 History</h2>
        <div id="history-list">Connecting...</div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://draqkbpyxtlwpxvadstp.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRyYXFrYnB5eHRsd3B4dmFkc3RwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMTI5MjMsImV4cCI6MjA5Mzg4ODkyM30.b8JcFSrWMB34Xgop6Zs2HShbaRyO1mSr59Wafqc_wf4';
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let transactions = [];
    let myChart;

    async function fetchFromCloud() {
        const { data, error } = await supabaseClient.from('transactions').select('*').order('created_at', { ascending: true });
        if (!error) { transactions = data; refreshUI(); }
    }

    async function handleSave() {
        const name = document.getElementById('name').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const type = document.getElementById('type').value;
        if (!name || isNaN(amount)) return;

        await supabaseClient.from('transactions').insert([{ name, amount, type, date: new Date().toLocaleDateString('de-DE') }]);
        document.getElementById('name').value = '';
        document.getElementById('amount').value = '';
        fetchFromCloud();
    }

    async function deleteEntry(id) {
        if(confirm("Delete?")) {
            await supabaseClient.from('transactions').delete().eq('id', id);
            fetchFromCloud();
        }
    }

    function refreshUI() {
        let totalInc = 0; let totalExp = 0;
        transactions.forEach(t => { t.type === 'income' ? totalInc += t.amount : totalExp += t.amount; });
        document.getElementById('balance').innerText = (totalInc - totalExp).toFixed(2);
        
        const list = document.getElementById('history-list');
        list.innerHTML = '';
        [...transactions].reverse().forEach(t => {
            list.innerHTML += `
                <div class="history-item">
                    <div><strong>${t.name}</strong><br><small>${t.date}</small></div>
                    <div>
                        <span class="${t.type === 'income' ? 'type-income' : 'type-expense'}">${t.amount.toFixed(2)}€</span>
                        <button class="delete-btn" onclick="deleteEntry(${t.id})" style="margin-left:10px">X</button>
                    </div>
                </div>`;
        });
        updateChart(totalInc, totalExp);
    }

    function updateChart(inc, exp) {
        const ctx = document.getElementById('myChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Income', 'Expenses'],
                datasets: [{ data: [inc, exp], backgroundColor: ['#2ed573', '#ff4757'] }]
            }
        });
    }

    function openTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    fetchFromCloud();
</script>
</body>
</html>
